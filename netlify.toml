[build]
publish = "."
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "18"

[functions]
# Ensure Netlify packages our custom functions and any helper files.
# previously only templates were included, which could exclude new JS files
# such as rewriteBlock.js. Expand the pattern accordingly.
included_files = [
  "netlify/functions/templates/**",
  "netlify/functions/*.js"
]
