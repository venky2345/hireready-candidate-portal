<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JD Match Template Admin - HireReady</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ADMIN PAGE THEME - Premium dark theme with glow effects */
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg0) 0%, var(--bg1) 50%, #1a1420 100%);
      color: var(--text);
      min-height: 100vh;
      background-attachment: fixed;
    }

    .admin-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .admin-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 28px;
      background: rgba(11, 10, 18, 0.98);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .admin-back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(182, 156, 255, 0.1);
      border: 1px solid rgba(182, 156, 255, 0.3);
      border-radius: 8px;
      color: var(--accentA);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .admin-back-btn:hover {
      background: rgba(182, 156, 255, 0.18);
      border-color: rgba(182, 156, 255, 0.5);
      transform: translateY(-1px);
    }

    .admin-title-box {
      flex: 1;
      text-align: center;
    }

    .admin-title {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accentA) 0%, var(--accentB) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 4px;
    }

    .admin-subtitle {
      font-size: 12px;
      color: var(--muted2);
      font-weight: 400;
      margin: 0;
    }

    /* MAIN CONTENT */
    .admin-main {
      flex: 1;
      padding: 32px 28px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }

    @media (max-width: 1200px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }

    /* PANEL CARDS */
    .admin-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-icon {
      font-size: 18px;
    }

    /* FORM CONTROLS */
    .form-row {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-hint {
      font-size: 11px;
      color: var(--muted2);
      font-weight: 400;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none;
      border-color: var(--accentA);
      background: rgba(182, 156, 255, 0.05);
      box-shadow: 0 0 0 3px rgba(182, 156, 255, 0.1);
    }

    .form-textarea {
      resize: vertical;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
    }

    .form-select {
      cursor: pointer;
      background: #1a1824;
    }

    .form-select option {
      background: #1a1824;
      color: var(--text);
      padding: 8px;
    }

    .form-row-inline {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .form-row-inline .form-row {
      flex: 1;
      margin-bottom: 0;
    }

    .form-checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .form-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accentA);
    }

    .form-checkbox-label {
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }

    /* BUTTONS */
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accentA), var(--accentB));
      color: white;
      box-shadow: 0 2px 8px rgba(182, 156, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(182, 156, 255, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(182, 156, 255, 0.3);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.25);
      border-color: rgba(239, 68, 68, 0.5);
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    /* STATUS MESSAGES */
    .status-message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .status-message.show {
      display: block;
    }

    .status-success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    .status-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    .status-warning {
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid rgba(251, 191, 36, 0.3);
      color: #fbbf24;
    }

    /* TEMPLATE LIBRARY */
    .template-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 600px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .template-list::-webkit-scrollbar {
      width: 6px;
    }

    .template-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 3px;
    }

    .template-list::-webkit-scrollbar-thumb {
      background: var(--accentA);
      border-radius: 3px;
    }

    .template-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .template-item:hover {
      background: rgba(182, 156, 255, 0.05);
      border-color: rgba(182, 156, 255, 0.3);
    }

    .template-item.default {
      border-color: var(--accentA);
      background: rgba(182, 156, 255, 0.08);
    }

    .template-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .template-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .template-badges {
      display: flex;
      gap: 6px;
    }

    .template-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .badge-published {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .badge-unpublished {
      background: rgba(156, 163, 175, 0.15);
      color: #9ca3af;
      border: 1px solid rgba(156, 163, 175, 0.3);
    }

    .badge-default {
      background: rgba(182, 156, 255, 0.15);
      color: var(--accentA);
      border: 1px solid rgba(182, 156, 255, 0.3);
    }

    .template-meta {
      font-size: 12px;
      color: var(--muted2);
      margin-bottom: 8px;
    }

    .template-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .template-action-btn {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .template-action-btn:hover {
      background: rgba(182, 156, 255, 0.1);
      border-color: rgba(182, 156, 255, 0.3);
    }

    /* PREVIEW PANEL */
    .preview-container {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-iframe {
      width: 100%;
      height: 600px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .preview-placeholder {
      text-align: center;
      color: var(--muted2);
      font-size: 14px;
    }

    .preview-note {
      font-size: 11px;
      color: var(--muted2);
      margin-top: 8px;
      text-align: center;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted2);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="admin-wrapper">
    <!-- HEADER -->
    <div class="admin-header">
      <a href="admin.html" class="admin-back-btn">← Back to Portal</a>
      <div class="admin-title-box">
        <div class="admin-title">⚙ JD Match Template Admin</div>
        <div class="admin-subtitle">Create and manage shared HTML resume templates</div>
      </div>
      <a href="jdmatch.html" class="admin-back-btn" target="_blank">Open User JD Match →</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="admin-main">
      <!-- TOP GRID: FORM + PREVIEW -->
      <div class="admin-grid">
        <!-- TEMPLATE FORM -->
        <div class="admin-panel">
          <div class="panel-header">
            <div class="panel-title">
              <span class="panel-icon">📝</span>
              Template Form
            </div>
          </div>

          <form id="templateForm" onsubmit="return false;">
            <input type="hidden" id="templateId" value="">

            <div class="form-row">
              <label class="form-label">
                Template Name
                <span class="form-hint">(auto-generated if blank)</span>
              </label>
              <input type="text" id="templateName" class="form-input" placeholder="e.g., Bold Two-Column" autocomplete="off">
            </div>

            <div class="form-row-inline">
              <div class="form-row">
                <label class="form-label">Category / Tag</label>
                <select id="templateTag" class="form-select">
                  <option value="">Auto-detect</option>
                  <option value="Modern">Modern</option>
                  <option value="Classic">Classic</option>
                  <option value="Executive">Executive</option>
                  <option value="Academic">Academic</option>
                  <option value="Compact">Compact</option>
                  <option value="Custom">Custom</option>
                </select>
              </div>
              <div class="form-row">
                <div class="form-checkbox-group">
                  <input type="checkbox" id="templatePublish" class="form-checkbox" checked>
                  <label for="templatePublish" class="form-checkbox-label">Publish to Users</label>
                </div>
              </div>
            </div>

            <div class="form-row">
              <label class="form-label">
                CSS Code
                <span class="form-hint">(optional - injected if HTML is partial)</span>
              </label>
              <textarea id="templateCss" class="form-textarea" rows="6" placeholder="body { font-family: Arial; color: #333; }"></textarea>
            </div>

            <div class="form-row">
              <label class="form-label">
                HTML Code *
                <span class="form-hint">(full &lt;!DOCTYPE html&gt; recommended)</span>
              </label>
              <textarea id="templateHtml" class="form-textarea" rows="10" placeholder="<!DOCTYPE html><html>...</html>" required></textarea>
            </div>

            <div class="status-message" id="formStatus"></div>

            <div class="btn-group">
              <button type="button" class="btn btn-primary" onclick="saveTemplate()">
                ✓ Save Template
              </button>
              <button type="button" class="btn btn-secondary" onclick="previewTemplate()">
                👁 Preview
              </button>
              <button type="button" class="btn btn-secondary" onclick="clearForm()">
                ✕ Clear Form
              </button>
              <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteTemplate()" style="display:none;">
                🗑 Delete
              </button>
            </div>
          </form>
        </div>

        <!-- PREVIEW PANEL -->
        <div class="admin-panel">
          <div class="panel-header">
            <div class="panel-title">
              <span class="panel-icon">👁</span>
              Live Preview
            </div>
          </div>

          <div class="preview-container" id="previewContainer">
            <div class="preview-placeholder">
              Fill in the template form and click "Preview" to see the result
            </div>
          </div>
          <div class="preview-note">Preview uses sample data (John Doe, etc.)</div>
        </div>
      </div>

      <!-- TEMPLATE LIBRARY -->
      <div class="admin-panel">
        <div class="panel-header">
          <div class="panel-title">
            <span class="panel-icon">📚</span>
            Template Library
            <span id="templateCount" style="font-size:12px;color:var(--muted2);font-weight:400;"></span>
          </div>
          <button class="btn btn-secondary" onclick="refreshLibrary()">
            ↻ Refresh
          </button>
        </div>

        <div class="template-list" id="templateList">
          <!-- Templates will be rendered here -->
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========================
    // STORAGE CONSTANTS (REUSING EXISTING SCHEMA)
    // ========================
    const _TPL_STORAGE_KEY_GLOBAL = 'hireready_templates_global_v1';
    const _JDM_ADMIN_CFG_KEY = 'hr_jdmatch_admin_config_v1';

    // ========================
    // STORAGE FUNCTIONS (REUSED FROM jdmatch.html)
    // ========================
    function _loadStoredTemplates() {
      try {
        const rawGlobal = localStorage.getItem(_TPL_STORAGE_KEY_GLOBAL);
        if (rawGlobal) {
          const arr = JSON.parse(rawGlobal);
          if (Array.isArray(arr)) {
            console.log('[tpl-admin] loaded', arr.filter(t => t && t.sourceType === 'admin').length, 'admin templates from global store');
            return arr.filter(t => t && t.id && t.sourceType !== 'system');
          }
        }
        return [];
      } catch(e) {
        console.warn('[tpl-admin] failed to parse stored templates:', e);
        return [];
      }
    }

    function _saveStoredTemplates(arr) {
      try {
        localStorage.setItem(_TPL_STORAGE_KEY_GLOBAL, JSON.stringify(arr));
        console.log('[tpl-admin] saved', arr.filter(t => t && t.sourceType === 'admin').length, 'admin templates to global store | total:', arr.length);
      }
      catch(e) { console.error('[tpl-admin] failed to persist templates:', e); }
    }

    function getAdminConfig() {
      try { return JSON.parse(localStorage.getItem(_JDM_ADMIN_CFG_KEY) || '{}'); }
      catch(e) { return {}; }
    }

    function setAdminConfig(patch) {
      const cfg = { ...getAdminConfig(), ...patch, updatedAt: new Date().toISOString() };
      localStorage.setItem(_JDM_ADMIN_CFG_KEY, JSON.stringify(cfg));
      console.log('[tpl-admin] admin config saved', cfg);
      return cfg;
    }

    // ========================
    // TEMPLATE NAME AUTO-GENERATION (REUSED LOGIC)
    // ========================
    function inferTemplateMetaFromHtml(htmlCode, cssCode) {
      const src = ((htmlCode || '') + ' ' + (cssCode || '')).toLowerCase();
      let name = '';
      let category = 'custom';
      let layout = 'single-column';

      // Layout detection
      const hasTwoCol = /grid-template-columns|display\s*:\s*grid|flex.*row|two.?col|sidebar|column.*left|left.*column|float\s*:\s*left/.test(src);
      const hasSidebar = /sidebar|aside|side.?bar|left.?panel|right.?panel/.test(src);
      if (hasSidebar) { layout = 'sidebar'; }
      else if (hasTwoCol) { layout = 'two-column'; }

      // Style cues
      const hasSerif = /georgia|times|palatino|garamond|merriweather|playfair|serif/.test(src);
      const hasBoldHeader = /font-size\s*:\s*[23456][0-9]px|font-weight\s*:\s*[789]00|font-weight\s*:\s*bold/.test(src);
      const hasAccentBorder = /border-left\s*:|border-right\s*:|accent|border.*solid.*#[0-9a-f]{3,6}/.test(src);
      const hasDividers = /border-bottom|border-top|hr\s|<hr|divider/.test(src);
      const hasCompact = /font-size\s*:\s*1[01]px|margin\s*:\s*[01234]px|padding\s*:\s*[01234]px|compact/.test(src);
      const hasTimeline = /timeline|::before|content\s*:\s*["']"|border-radius.*50%/.test(src);
      const hasAcademic = /education|university|thesis|gpa|academic|publications/.test(src);
      const hasExecutive = /executive|director|vp |vice.?president|c-suite|leadership/i.test(src + htmlCode);
      const hasMinimal = /minimal|clean|simple|white.*space|light.*gray/.test(src);
      const hasBanner = /background.*#[0-9a-f]{3,6}|background-color.*[^w]|header.*height\s*:\s*[6-9][0-9]px|header.*height\s*:\s*1[0-9]{2}px/.test(src);

      // Name resolution
      if (hasSidebar && hasSerif) { name = 'Executive Sidebar'; category = 'executive'; }
      else if (hasSidebar) { name = 'Clean Two-Column'; category = 'modern'; }
      else if (layout === 'two-column' && hasBoldHeader) { name = 'Bold Two-Column'; category = 'modern'; }
      else if (layout === 'two-column') { name = 'Modern Two-Column'; category = 'modern'; }
      else if (hasExecutive && hasSerif) { name = 'Executive Serif'; category = 'executive'; }
      else if (hasExecutive) { name = 'Executive Professional'; category = 'executive'; }
      else if (hasAcademic) { name = 'Academic Clean'; category = 'academic'; }
      else if (hasTimeline) { name = 'Timeline Light'; category = 'modern'; }
      else if (hasAccentBorder && !hasSerif) { name = 'Left Accent Line'; category = 'modern'; }
      else if (hasAccentBorder && hasSerif) { name = 'Accent Serif'; category = 'classic'; }
      else if (hasBanner && hasBoldHeader) { name = 'Bold Header Bar'; category = 'modern'; }
      else if (hasBanner) { name = 'Banner Header'; category = 'modern'; }
      else if (hasDividers && hasSerif) { name = 'Classic Divider'; category = 'classic'; }
      else if (hasDividers) { name = 'Divider Sections'; category = 'classic'; }
      else if (hasCompact) { name = 'Compact Professional'; category = 'compact'; }
      else if (hasSerif) { name = 'Classic ATS'; category = 'classic'; }
      else if (hasMinimal) { name = 'Modern Minimal'; category = 'modern'; }
      else if (hasBoldHeader) { name = 'Bold Professional'; category = 'modern'; }
      else { name = 'Custom Professional'; category = 'custom'; }

      const _layoutPrefix = (layout === 'two-column' || layout === 'sidebar') ? 'Two Column - ' : 'Single Column - ';
      const _prefixedName = _layoutPrefix + name;
      console.log('[tpl-admin] inferred:', _prefixedName, '| category:', category, '| layout:', layout);
      return { suggestedName: _prefixedName, suggestedCategory: category, layoutType: layout };
    }

    function makeTemplateNameUnique(baseName) {
      const existing = new Set(_loadStoredTemplates().map(t => t.name.toLowerCase()));
      if (!existing.has(baseName.toLowerCase())) return baseName;
      let i = 2;
      while (existing.has((baseName + ' ' + i).toLowerCase())) i++;
      console.log('[tpl-admin] duplicate resolved:', baseName, '->', baseName + ' ' + i);
      return baseName + ' ' + i;
    }

    // ========================
    // PLACEHOLDER SUBSTITUTION FOR PREVIEW (REUSED LOGIC)
    // ========================
    function applyPreviewPlaceholders(html) {
      const substitutions = [
        { pattern: /Candidate Name/gi, replacement: 'John Doe' },
        { pattern: /email@example\.com/gi, replacement: 'john.doe@email.com' },
        { pattern: /\+91 XXXXXXXXXX/g, replacement: '+91 9876543210' },
        { pattern: /City, India/gi, replacement: 'Bengaluru, India' },
        { pattern: /Organization Name/gi, replacement: 'ABC Solutions Pvt Ltd' },
        { pattern: /Professional Role Title/gi, replacement: 'Senior Support Specialist' },
        { pattern: /MM\/YYYY – MM\/YYYY/g, replacement: '01/2022 – Present' },
        { pattern: /Client Company Name/gi, replacement: 'Sample Client Corporation' },
        { pattern: /Degree Title/gi, replacement: 'Bachelor of Technology' },
        { pattern: /College Name/gi, replacement: 'Sample Institute of Technology' }
      ];

      let transformedHtml = html;
      substitutions.forEach(sub => {
        transformedHtml = transformedHtml.replace(sub.pattern, sub.replacement);
      });

      return transformedHtml;
    }

    // ========================
    // TEMPLATE FORM FUNCTIONS
    // ========================
    function saveTemplate() {
      console.log('[tpl-admin] saveTemplate() called');
      const statusEl = document.getElementById('formStatus');
      const htmlEl = document.getElementById('templateHtml');
      const cssEl = document.getElementById('templateCss');
      const nameEl = document.getElementById('templateName');
      const tagEl = document.getElementById('templateTag');
      const publishEl = document.getElementById('templatePublish');
      const idEl = document.getElementById('templateId');

      const html = (htmlEl?.value || '').trim();
      const css = (cssEl?.value || '').trim();
      const publish = publishEl?.checked !== false;

      // Validation
      if (!html) {
        showStatus('error', 'HTML code is required');
        return;
      }
      if (html.length < 10) {
        showStatus('error', 'HTML code is too short');
        return;
      }

      // Auto-generate name if blank
      let name = (nameEl?.value || '').trim();
      let tag = (tagEl?.value || '').trim();
      
      if (!name) {
        const meta = inferTemplateMetaFromHtml(html, css);
        name = meta.suggestedName;
        console.log('[tpl-admin] auto-generated name:', name);
      }

      if (!tag) {
        const meta = inferTemplateMetaFromHtml(html, css);
        tag = meta.suggestedCategory.charAt(0).toUpperCase() + meta.suggestedCategory.slice(1);
      }

      // Check for duplicates (unless editing existing)
      const existingId = idEl?.value || '';
      if (!existingId) {
        name = makeTemplateNameUnique(name);
      }

      // Create or update template record
      const templateId = existingId || ('atpl_' + Date.now().toString(36));
      const now = new Date().toISOString();
      
      const record = {
        id: templateId,
        name: name,
        tag: tag,
        sourceType: 'admin',
        isPublished: publish,
        category: tag.toLowerCase(),
        ownerUserId: null,
        htmlCode: html,
        cssCode: css || null,
        createdAt: existingId ? (findTemplateById(existingId)?.createdAt || now) : now,
        updatedAt: now
      };

      console.log('[tpl-admin] saving template | id:', templateId, '| name:', name, '| published:', publish, '| HTML length:', html.length);

      // Save to storage
      const stored = _loadStoredTemplates();
      const idx = stored.findIndex(t => t.id === templateId);
      
      if (idx >= 0) {
        stored[idx] = record;
        console.log('[tpl-admin] updated existing template at index', idx);
      } else {
        stored.push(record);
        console.log('[tpl-admin] added new template, total:', stored.length);
      }

      _saveStoredTemplates(stored);
      localStorage.setItem(_TPL_STORAGE_KEY_GLOBAL + '_touch', String(Date.now()));

      // Read-after-write verification
      const verified = _loadStoredTemplates().find(t => t.id === templateId);
      if (!verified) {
        showStatus('error', 'Save verification failed - template not found after write');
        console.error('[tpl-admin] verification failed for:', templateId);
        return;
      }

      console.log('[tpl-admin] verified template saved successfully | total templates:', _loadStoredTemplates().length);
      showStatus('success', `✓ Template "${name}" saved successfully`);

      // Clear form and refresh library
      clearForm();
      refreshLibrary();
    }

    function previewTemplate() {
      console.log('[tpl-admin] previewTemplate() called');
      const htmlEl = document.getElementById('templateHtml');
      const cssEl = document.getElementById('templateCss');

      let html = (htmlEl?.value || '').trim();
      const css = (cssEl?.value || '').trim();

      if (!html) {
        showStatus('warning', 'No HTML to preview');
        return;
      }

      // Apply sample placeholder substitutions
      html = applyPreviewPlaceholders(html);

      // Wrap partial HTML with CSS if needed
      const isFullDoc = /<html[\s>]/i.test(html);
      if (!isFullDoc && css) {
        html = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>${css}</style></head><body>${html}</body></html>`;
      } else if (!isFullDoc) {
        html = `<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>${html}</body></html>`;
      }

      // Render in iframe
      const container = document.getElementById('previewContainer');
      container.innerHTML = '<iframe class="preview-iframe" sandbox="allow-same-origin"></iframe>';
      const iframe = container.querySelector('iframe');
      iframe.srcdoc = html;

      console.log('[tpl-admin] preview rendered | HTML length:', html.length);
    }

    function clearForm() {
      document.getElementById('templateId').value = '';
      document.getElementById('templateName').value = '';
      document.getElementById('templateTag').value = '';
      document.getElementById('templateCss').value = '';
      document.getElementById('templateHtml').value = '';
      document.getElementById('templatePublish').checked = true;
      document.getElementById('deleteBtn').style.display = 'none';
      
      // Reset preview
      const container = document.getElementById('previewContainer');
      container.innerHTML = '<div class="preview-placeholder">Fill in the template form and click "Preview" to see the result</div>';
      
      hideStatus();
      console.log('[tpl-admin] form cleared');
    }

    function deleteTemplate() {
      const idEl = document.getElementById('templateId');
      const templateId = idEl?.value;

      if (!templateId) return;

      const template = findTemplateById(templateId);
      if (!template) return;

      if (!confirm(`Delete template "${template.name}"?\n\nThis action cannot be undone.`)) {
        return;
      }

      console.log('[tpl-admin] deleting template:', templateId, template.name);

      const stored = _loadStoredTemplates();
      const filtered = stored.filter(t => t.id !== templateId);
      _saveStoredTemplates(filtered);
      localStorage.setItem(_TPL_STORAGE_KEY_GLOBAL + '_touch', String(Date.now()));

      // Also remove from default if it was set
      const cfg = getAdminConfig();
      if (cfg.defaultTemplateId === templateId) {
        setAdminConfig({ defaultTemplateId: null });
        console.log('[tpl-admin] removed deleted template from default');
      }

      console.log('[tpl-admin] template deleted | remaining:', filtered.length);
      showStatus('success', `✓ Template "${template.name}" deleted`);

      clearForm();
      refreshLibrary();
    }

    // ========================
    // TEMPLATE LIBRARY FUNCTIONS
    // ========================
    function refreshLibrary() {
      console.log('[tpl-admin] refreshing library');
      const templates = _loadStoredTemplates();
      const cfg = getAdminConfig();
      const listEl = document.getElementById('templateList');
      const countEl = document.getElementById('templateCount');

      countEl.textContent = `(${templates.length} ${templates.length === 1 ? 'template' : 'templates'})`;

      if (templates.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-text">No templates yet. Create your first template above.</div>
          </div>
        `;
        return;
      }

      // Sort by updated date (newest first)
      templates.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

      listEl.innerHTML = templates.map(tpl => {
        const isDefault = cfg.defaultTemplateId === tpl.id;
        const updatedDate = new Date(tpl.updatedAt).toLocaleDateString();
        const updatedTime = new Date(tpl.updatedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        return `
          <div class="template-item ${isDefault ? 'default' : ''}" onclick="editTemplate('${tpl.id}')">
            <div class="template-item-header">
              <div class="template-name">${escapeHtml(tpl.name)}</div>
              <div class="template-badges">
                ${tpl.isPublished 
                  ? '<span class="template-badge badge-published">Published</span>' 
                  : '<span class="template-badge badge-unpublished">Draft</span>'}
                ${isDefault ? '<span class="template-badge badge-default">Default</span>' : ''}
              </div>
            </div>
            <div class="template-meta">
              Tag: ${escapeHtml(tpl.tag)} • Updated: ${updatedDate} ${updatedTime}
            </div>
            <div class="template-actions" onclick="event.stopPropagation();">
              <button class="template-action-btn" onclick="editTemplate('${tpl.id}')">✏ Edit</button>
              <button class="template-action-btn" onclick="duplicateTemplate('${tpl.id}')">📋 Duplicate</button>
              <button class="template-action-btn" onclick="togglePublish('${tpl.id}')">
                ${tpl.isPublished ? '👁 Unpublish' : '👁 Publish'}
              </button>
              <button class="template-action-btn" onclick="setAsDefault('${tpl.id}')">★ Set as Default</button>
            </div>
          </div>
        `;
      }).join('');

      console.log('[tpl-admin] library rendered | count:', templates.length);
    }

    function editTemplate(templateId) {
      console.log('[tpl-admin] editing template:', templateId);
      const template = findTemplateById(templateId);
      if (!template) return;

      document.getElementById('templateId').value = template.id;
      document.getElementById('templateName').value = template.name;
      document.getElementById('templateTag').value = template.tag || '';
      document.getElementById('templateCss').value = template.cssCode || '';
      document.getElementById('templateHtml').value = template.htmlCode || '';
      document.getElementById('templatePublish').checked = template.isPublished !== false;
      document.getElementById('deleteBtn').style.display = 'inline-flex';

      hideStatus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function duplicateTemplate(templateId) {
      console.log('[tpl-admin] duplicating template:', templateId);
      const template = findTemplateById(templateId);
      if (!template) return;

      const newName = makeTemplateNameUnique(template.name + ' Copy');

      document.getElementById('templateId').value = '';
      document.getElementById('templateName').value = newName;
      document.getElementById('templateTag').value = template.tag || '';
      document.getElementById('templateCss').value = template.cssCode || '';
      document.getElementById('templateHtml').value = template.htmlCode || '';
      document.getElementById('templatePublish').checked = template.isPublished !== false;
      document.getElementById('deleteBtn').style.display = 'none';

      showStatus('warning', `Editing duplicate of "${template.name}". Click Save to create.`);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function togglePublish(templateId) {
      console.log('[tpl-admin] toggling publish for:', templateId);
      const stored = _loadStoredTemplates();
      const idx = stored.findIndex(t => t.id === templateId);
      
      if (idx < 0) return;

      stored[idx].isPublished = !stored[idx].isPublished;
      stored[idx].updatedAt = new Date().toISOString();
      
      _saveStoredTemplates(stored);
      
      console.log('[tpl-admin] publish toggled:', stored[idx].name, '| published:', stored[idx].isPublished);
      refreshLibrary();
    }

    function setAsDefault(templateId) {
      console.log('[tpl-admin] setting default template:', templateId);
      const template = findTemplateById(templateId);
      if (!template) return;

      setAdminConfig({ defaultTemplateId: templateId });
      
      console.log('[tpl-admin] default template set:', template.name);
      showStatus('success', `✓ "${template.name}" set as default for users`);
      refreshLibrary();
    }

    // ========================
    // HELPER FUNCTIONS
    // ========================
    function findTemplateById(id) {
      return _loadStoredTemplates().find(t => t.id === id);
    }

    function showStatus(type, message) {
      const statusEl = document.getElementById('formStatus');
      statusEl.className = 'status-message show status-' + type;
      statusEl.textContent = message;
    }

    function hideStatus() {
      const statusEl = document.getElementById('formStatus');
      statusEl.className = 'status-message';
      statusEl.textContent = '';
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    // ========================
    // INIT
    // ========================
    document.addEventListener('DOMContentLoaded', () => {
      console.log('[tpl-admin] === JD MATCH TEMPLATE ADMIN INITIALIZED ===');
      console.log('[tpl-admin] Storage key:', _TPL_STORAGE_KEY_GLOBAL);
      console.log('[tpl-admin] Admin config key:', _JDM_ADMIN_CFG_KEY);
      
      refreshLibrary();
      
      console.log('[tpl-admin] Ready');
    });
  </script>
</body>
</html>
